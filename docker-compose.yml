services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ehr
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr -d ehr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
